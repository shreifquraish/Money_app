name: hesab
description: "تطبيق إدارة الأموال"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.3.3
  google_fonts: ^6.3.0
  animate_do: ^4.0.1
  pdf: ^3.11.3
  printing: ^5.14.3
  file_saver: ^0.2.14
  url_launcher: ^6.3.1   # 👈 أضف هذا

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/Cairo-Regular.ttf

flutter_native_splash:
  color: "#42a5f5"
  image: img/logo_hesab.png
  fullscreen: true
  android_12:
    color: "#42a5f5"
    image: img/logo_hesab.png
    icon_background_color: "#111111"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "img/logo_hesab.png"
  remove_alpha_ios: true